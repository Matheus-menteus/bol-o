<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS:MAJOR // 7a0 DRAFT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
.cs-root * { box-sizing: border-box; margin: 0; padding: 0; }
body { background-color: #050608; display: flex; justify-content: center; padding: 20px; }
.cs-root {
  --bg: #0b0d10; --bg2: #13161b; --bg3: #1c2028; --panel: #161a20;
  --grn: #2ecc71; --grn-dim: #1e824c; --grn-bg: rgba(46, 204, 113, 0.1);
  --amber: #e67e22; --amber-bg: rgba(230, 126, 34, 0.1);
  --ct: #5D9CEC; --ct-bg: rgba(93, 156, 236, 0.15);
  --tr: #e67e22; --tr-bg: rgba(230, 126, 34, 0.15);
  --red: #e74c3c; --red-bg: rgba(231, 76, 60, 0.15);
  --txt: #f0f2f5; --txt2: #8b94a6; --txt3: #5a6373;
  --line: rgba(255, 255, 255, 0.05); --line2: rgba(255, 255, 255, 0.1);
  font-family: 'Inter', sans-serif; color: var(--txt); background: var(--bg);
  border: 1px solid var(--line2); border-radius: 8px; overflow: hidden;
  width: 100%; max-width: 950px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
  background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,.01) 2px, rgba(255,255,255,.01) 4px);
}
.mono { font-family: 'JetBrains Mono', monospace; }
.disp { font-family: 'Rajdhani', sans-serif; }
.cs-pad { padding: 20px }
.screen { display: none; animation: fadeIn 0.3s ease; }
.screen.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

/* === BANDEIRAS CSS (funcionam em qualquer SO) === */
.flag { display:inline-block; width:18px; height:12px; border-radius:2px; vertical-align:middle; position:relative; overflow:hidden; border:1px solid rgba(0,0,0,.3); flex-shrink:0; }
.flag.lg { width:22px; height:15px; }
.flag-se { background:#006aa7; } .flag-se::after{content:'';position:absolute;left:5px;top:0;bottom:0;width:3px;background:#fecc00;} .flag-se::before{content:'';position:absolute;top:5px;left:0;right:0;height:3px;background:#fecc00;}
.flag-br { background:#009b3a; } .flag-br::before{content:'';position:absolute;top:2px;left:5px;width:8px;height:8px;background:#ffdf00;transform:rotate(45deg);} .flag-br::after{content:'';position:absolute;top:4.5px;left:7px;width:3px;height:3px;border-radius:50%;background:#002776;}
.flag-dk { background:#c8102e; } .flag-dk::after{content:'';position:absolute;left:5px;top:0;bottom:0;width:2.5px;background:#fff;} .flag-dk::before{content:'';position:absolute;top:5px;left:0;right:0;height:2.5px;background:#fff;}
.flag-ua { background:linear-gradient(#0057b7 50%, #ffd700 50%); }
.flag-us { background:#b22234; } .flag-us::before{content:'';position:absolute;top:0;left:0;width:9px;height:7px;background:#3c3b6e;} .flag-us::after{content:'';position:absolute;top:0;left:0;right:0;height:100%;background:repeating-linear-gradient(#b22234 0 1.7px,#fff 1.7px 3.4px);opacity:.5;}
.flag-pl { background:linear-gradient(#fff 50%, #dc143c 50%); }
.flag-fr { background:linear-gradient(90deg,#0055a4 33%,#fff 33% 66%,#ef4135 66%); }
.flag-ru { background:linear-gradient(#fff 33%, #0039a6 33% 66%, #d52b1e 66%); }
.flag-kz { background:#00afca; } .flag-kz::after{content:'★';position:absolute;top:-2px;left:6px;color:#ffe400;font-size:9px;}
.flag-sa { background:#006c35; } .flag-sa::after{content:'';position:absolute;top:4.5px;left:3px;right:3px;height:2px;background:#fff;}
.flag-intl { background:linear-gradient(135deg,#444,#222); } .flag-intl::after{content:'\\1F310';position:absolute;top:-1px;left:3px;font-size:9px;}
.flag-pick { background:linear-gradient(135deg,#e67e22,#f39c12); }

/* HEADER */
.hud-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; background: var(--bg2); border-bottom: 2px solid var(--grn-dim); }
.hud-logo { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 20px; letter-spacing: 0.15em; color: var(--grn); display: flex; align-items: center; gap: 8px; text-shadow: 0 0 10px rgba(46, 204, 113, 0.3); }
.hud-logo .sub { color: var(--amber); font-size: 12px; letter-spacing: 0.1em; }
.hud-status { font-size: 10px; color: var(--txt2); letter-spacing: 0.1em; text-align: right; line-height: 1.5; font-family: 'JetBrains Mono', monospace; }
.hud-status .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--grn); margin-right: 5px; box-shadow: 0 0 8px var(--grn); animation: blink 2s infinite; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* DRAFT SLOTS */
.slots-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 16px; }
.slot { background: var(--panel); border: 1px solid var(--line2); border-radius: 6px; padding: 12px 8px; text-align: center; position: relative; transition: all .2s; }
.slot.filled { border-color: var(--grn-dim); background: var(--grn-bg); border-top: 3px solid var(--grn); }
.slot-role { font-size: 9px; letter-spacing: 0.1em; color: var(--txt3); margin-bottom: 6px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 4px; text-transform: uppercase; }
.slot.filled .slot-role { color: var(--grn); }
.slot-name { font-size: 13px; font-weight: 700; color: var(--txt); margin-bottom: 2px; display:flex; align-items:center; justify-content:center; gap:5px; }
.slot-from { font-size: 9px; color: var(--txt2); }
.slot-ovr { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; margin-top: 6px; }
.slot-empty { font-size: 16px; color: var(--txt3); margin: 10px 0; }

.ovr-strip { display: flex; align-items: center; gap: 14px; padding: 12px 18px; background: var(--bg2); border: 1px solid var(--line); border-radius: 6px; margin-bottom: 20px; }
.ovr-strip .lbl { font-size: 11px; color: var(--txt2); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700;}
.ovr-track { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.ovr-fill { height: 100%; background: linear-gradient(90deg, var(--grn-dim), var(--grn)); border-radius: 3px; transition: width .5s; box-shadow: 0 0 10px rgba(46,204,113,.5); }
.ovr-num { font-family: 'Rajdhani', sans-serif; font-size: 24px; font-weight: 700; color: var(--grn); min-width: 40px; text-align: right; }

/* DICE / BOTOES */
.dice-zone { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 24px 0; }
.dice { width: 80px; height: 80px; background: var(--bg2); border: 2px solid var(--grn-dim); border-radius: 12px; font-size: 42px; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; transition: all .15s; color: var(--grn); box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
.dice:hover { border-color: var(--grn); background: var(--grn-bg); box-shadow: 0 0 20px rgba(46,204,113,.2); }
.dice:active { transform: scale(.95); }
.dice-hint { font-size: 12px; color: var(--txt2); letter-spacing: 0.1em; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }

.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 20px; font-size: 12px; font-family: 'Inter', sans-serif; font-weight: 600; border: 1px solid var(--line2); border-radius: 4px; background: var(--bg2); color: var(--txt); cursor: pointer; text-transform: uppercase; transition: all .15s; letter-spacing: 0.05em; }
.btn:hover { border-color: var(--txt2); background: var(--panel); }
.btn-p { background: var(--grn-dim); color: #fff; border-color: var(--grn-dim); }
.btn-p:hover { background: var(--grn); border-color: var(--grn); box-shadow: 0 0 15px rgba(46,204,113,.3); }
.btn-s { border-color: var(--ct); color: var(--ct); }
.btn-s:hover { background: var(--ct-bg); }
.btn:disabled { opacity:.4; cursor:not-allowed; }
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; justify-content: center; }

/* SETTINGS BAR (modo + velocidade) */
.settings-bar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:center; padding:12px; background:var(--bg2); border:1px solid var(--line); border-radius:6px; margin-bottom:16px; }
.seg { display:flex; background:var(--bg); border:1px solid var(--line2); border-radius:5px; overflow:hidden; }
.seg-lbl { font-size:9px; color:var(--txt3); letter-spacing:.1em; text-transform:uppercase; font-weight:700; margin-right:4px; align-self:center; }
.seg button { background:transparent; border:none; color:var(--txt2); padding:7px 12px; font-size:11px; font-family:'Inter',sans-serif; font-weight:600; cursor:pointer; transition:all .15s; text-transform:uppercase; letter-spacing:.04em; }
.seg button:hover { color:var(--txt); background:var(--panel); }
.seg button.on { background:var(--grn-dim); color:#fff; }
.seg button.on.ct { background:var(--ct); color:#fff; }

/* LINEUP CARD */
.lineup-card { background: var(--panel); border: 1px solid var(--line2); border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
.lineup-header { padding: 14px 18px; background: var(--bg2); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--line); }
.lineup-header .name { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; color: var(--txt); display:flex; align-items:center; gap:8px; }
.lineup-header .meta { font-size: 11px; color: var(--txt2); margin-top: 2px; }
.rating-badge { font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 700; padding: 4px 12px; border-radius: 4px; background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(230,126,34,.3); }
.player-list { padding: 10px; }
.prow { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; margin-bottom: 6px; background: var(--bg2); transition: all .15s; }
.prow:hover:not(.disabled):not(.taken) { border-color: var(--grn); background: var(--grn-bg); }
.prow.disabled { opacity: 0.4; cursor: not-allowed; }
.prow.taken { opacity: 0.2; cursor: not-allowed; }
.prow.chosen { border-color: var(--grn); background: var(--grn-bg); box-shadow: inset 4px 0 0 var(--grn); }
.prow-wep { font-size: 16px; color: var(--txt3); width: 24px; text-align: center; }
.prow-role { font-size: 10px; color: var(--txt2); width: 60px; font-weight: 600; }
.prow-name { font-weight: 700; font-size: 14px; color: var(--txt); display:flex; align-items:center; gap:6px; }
.prow-note { font-size: 11px; color: var(--txt3); margin-top: 2px; }
.prow-ovr { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; width: 34px; text-align: right; }
.role-chips { display:flex; gap:6px; flex-wrap:wrap; margin-top:7px; }
.role-chip { display:inline-flex; align-items:center; gap:4px; font-size:11px; padding:4px 9px; border-radius:4px; background:var(--bg3); border:1px solid var(--line2); color:var(--txt2); cursor:pointer; transition:all .12s; font-weight:600; }
.role-chip:hover { border-color:var(--grn); color:var(--txt); background:var(--grn-bg); }
.role-chip b { color:var(--txt); font-family:'Rajdhani',sans-serif; font-size:13px; }
.role-chip.sel { background:var(--grn-dim); border-color:var(--grn); color:#fff; }
.role-chip.sel b { color:#fff; }
.role-chip.off { opacity:.3; cursor:not-allowed; }
.role-chip.off:hover { border-color:var(--line2); color:var(--txt2); background:var(--bg3); }

/* PLACAR */
.match-stage { font-size: 11px; color: var(--txt2); letter-spacing: 0.15em; margin-bottom: 12px; text-transform: uppercase; font-weight: 700; text-align: center; }
.board { background: var(--panel); border: 1px solid var(--line2); border-radius: 8px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
.board-top { position: relative; padding: 24px 20px; background: #000; text-align: center; border-bottom: 1px solid var(--line); }
.board-mapbg { position: absolute; inset: 0; opacity: 0.2; background-size: cover; background-position: center; z-index: 0; }
.board-scanline { position: absolute; inset: 0; z-index: 1; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.3) 2px, rgba(0,0,0,.3) 4px); pointer-events: none; }
.board-top-in { position: relative; z-index: 2; }
.board-maprow { font-size: 10px; color: var(--amber); letter-spacing: 0.2em; margin-bottom: 16px; text-transform: uppercase; font-weight: 700; display:flex; align-items:center; justify-content:center; gap:8px; }
.board-livetag { display:inline-flex; align-items:center; gap:5px; color:var(--red); font-weight:700; }
.board-livetag .lvdot { width:7px; height:7px; border-radius:50%; background:var(--red); animation:blink 1s infinite; }
.board-bigscore { display: flex; align-items: center; justify-content: center; gap: 30px; margin-bottom: 10px; }
.board-sc { font-family: 'Rajdhani', sans-serif; font-size: 64px; font-weight: 700; line-height: 1; transition: color .2s; }
.board-sc.w { color: var(--grn); text-shadow: 0 0 30px rgba(46,204,113,.4); }
.board-sc.l { color: var(--red); text-shadow: 0 0 30px rgba(231,76,60,.4); }
.board-sc.tie { color: var(--txt); }
.board-sc.live { color: var(--txt); }
.board-sc.bump { animation: bump .25s ease; }
@keyframes bump { 0%{transform:scale(1);} 40%{transform:scale(1.25);} 100%{transform:scale(1);} }
.board-sc-colon { font-family: 'Rajdhani', sans-serif; font-size: 40px; color: var(--txt3); }
.board-teams-lbl { font-size: 14px; color: var(--txt2); letter-spacing: 0.05em; font-family: 'Rajdhani', sans-serif; font-weight: 600; display:flex; align-items:center; justify-content:center; gap:10px; }
.board-teams-lbl b { color: var(--txt); font-size: 16px; display:inline-flex; align-items:center; gap:6px; }
.board-halftime { font-size:10px; color:var(--txt3); margin-top:8px; letter-spacing:.1em; text-transform:uppercase; min-height:13px; }

/* PIPS DE SÉRIE (Bo3/Bo5) — bolinhas de mapa ganho */
.series-pips { display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom:10px; }
.series-pips .pip-dot { width:11px; height:11px; border-radius:50%; background:rgba(255,255,255,.12); border:1px solid var(--line2); transition:all .3s; }
.series-pips .pip-dot.won { background:var(--ct); border-color:var(--ct); box-shadow:0 0 8px var(--ct); }
.series-pips .pip-dot.opp.won { background:var(--tr); border-color:var(--tr); box-shadow:0 0 8px var(--tr); }
.series-pips .pip-vs { font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:700; color:var(--txt2); margin:0 8px; letter-spacing:.05em; }
/* MAPA ATUAL no centro do placar */
.board-curmap { font-size:12px; color:var(--amber); letter-spacing:.05em; margin:6px 0 4px; font-weight:600; display:flex; align-items:center; justify-content:center; gap:6px; min-height:16px; }
.board-curmap b { color:#fff; font-weight:700; }
.board-curmap i { font-size:13px; }
/* botão de emergência (sempre presente) */
.btn-ghost-em { background:transparent; border-color:var(--line2); color:var(--txt3); padding:8px 12px; }
.btn-ghost-em:hover { color:var(--txt); border-color:var(--txt3); }

.match-teams-wrapper { display: flex; width: 100%; background: var(--bg); }
.team-block { flex: 1; border-right: 1px solid var(--line); }
.team-block:last-child { border-right: none; }
.team-head { display: flex; align-items: center; gap: 8px; padding: 12px 16px; font-size: 14px; font-weight: 700; font-family: 'Rajdhani', sans-serif; letter-spacing: 0.05em; background: var(--bg2); border-bottom: 1px solid var(--line2); }
.team-head.tA { border-top: 3px solid var(--ct); }
.team-head.tB { border-top: 3px solid var(--tr); }
.team-head .tname { flex: 1; color: var(--txt); }
.team-head .tside { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; padding: 2px 6px; border-radius: 3px; }
.team-head.tA .tside { background: var(--ct-bg); color: var(--ct); }
.team-head.tB .tside { background: var(--tr-bg); color: var(--tr); }
.team-head .tovr { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--txt2); font-weight: 400; }
.sb-prow { display: flex; align-items: center; gap: 10px; padding: 8px 16px; font-size: 13px; border-bottom: 1px solid var(--line); background: var(--panel); }
.sb-prow:last-child { border-bottom: none; }
.sb-prow:nth-child(even) { background: var(--bg2); }
.sb-prow .sp-wep { width: 18px; text-align: center; color: var(--txt3); font-size: 15px; }
.sb-prow .sp-name { flex: 1; color: var(--txt); font-weight: 500; display:flex; align-items:center; gap:6px; }
.sb-prow .sp-role { font-size: 10px; color: var(--txt2); letter-spacing: 0.05em; font-family: 'JetBrains Mono', monospace; }

/* MAPAS DA SERIE */
.maps-list { padding: 14px 16px; background: var(--bg2); border-top: 1px solid var(--line); }
.maps-list-t { font-size: 10px; color: var(--txt3); letter-spacing: .14em; margin-bottom: 10px; text-transform: uppercase; font-weight:700; }
.map-line { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--line); }
.map-line:last-child { border: none; }
.map-line .mn { font-size: 11px; color: var(--txt2); width: 80px; display:flex; align-items:center; gap:6px; }
.map-line .msc { display: flex; gap: 8px; align-items: center; flex: 1; justify-content: center; font-family: 'Rajdhani', sans-serif; }
.map-line .ms { font-size: 18px; font-weight: 700; width: 26px; text-align: center; }
.map-line .ms.w { color: var(--grn); } .map-line .ms.l { color: var(--red); }
.map-line .ms-sep { font-size: 13px; color: var(--txt3); }
.map-line .mot { font-size: 9px; color: var(--amber); width: 26px; font-weight:700; }
.map-line .mw { font-size: 10px; width: 90px; text-align: right; color: var(--txt2); }
.map-line.pending { opacity:.4; }

/* FEED */
.hl-feed { padding: 16px; background: var(--bg); border-top: 1px solid var(--line); }
.hl-feed-t { font-size: 11px; color: var(--grn); letter-spacing: 0.1em; margin-bottom: 12px; text-transform: uppercase; font-weight: 700; }
.hl-item { display: flex; gap: 12px; padding: 8px 0; font-size: 12px; border-bottom: 1px solid var(--line); align-items: center; animation: fadeIn .3s ease; }
.hl-item:last-child { border-bottom: none; }
.hl-wep { font-size: 16px; width: 24px; text-align: center; color: var(--amber); }
.hl-map { font-size: 10px; color: var(--txt3); width: 60px; font-weight: 700; text-transform: uppercase; }
.hl-text { color: var(--txt2); flex: 1; line-height: 1.4; }
.hl-text b { color: #fff; font-weight: 600; }

/* VETO */
.veto { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.veto-map { flex: 1; min-width: 80px; background: var(--bg2); border: 1px solid var(--line); border-radius: 4px; overflow: hidden; position: relative; text-align: center; }
.veto-map .vm-img { height: 40px; background-size: cover; background-position: center; opacity: 0.4; }
.veto-map .vm-name { font-size: 10px; padding: 6px 2px; font-weight: 600; text-transform: uppercase; }
.veto-map .vm-tag { position: absolute; top: 4px; left: 4px; font-size: 8px; padding: 2px 4px; border-radius: 2px; font-weight: 700; z-index: 2; }
.veto-map.picked { border-color: var(--amber); }
.veto-map.picked .vm-tag { background: var(--amber); color: #000; }
.veto-map.picked .vm-img { opacity: 0.8; }
.veto-map.banned { opacity: 0.3; }
.veto-map.banned .vm-tag { background: var(--red); color: #fff; }
.veto-map.banned .vm-img { filter: grayscale(1); }
.veto-map.decider { border-color: var(--grn); }
.veto-map.decider .vm-tag { background: var(--grn); color: #000; }

/* RESULT */
.res-banner { text-align: center; padding: 30px 20px; border-radius: 8px; margin-bottom: 20px; position: relative; overflow: hidden; border: 1px solid; }
.res-banner.win { border-color: var(--grn); background: linear-gradient(180deg, var(--grn-bg) 0%, transparent 100%); }
.res-banner.loss { border-color: var(--red); background: linear-gradient(180deg, var(--red-bg) 0%, transparent 100%); }
.res-banner h2 { font-family: 'Rajdhani', sans-serif; font-size: 32px; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
.res-banner.win h2 { color: var(--grn); text-shadow: 0 0 20px rgba(46,204,113,.4); }
.res-banner.loss h2 { color: var(--red); text-shadow: 0 0 20px rgba(231,76,60,.5); }
.res-banner p { font-size: 13px; color: var(--txt2); }

.stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:20px; }
.sc { background:var(--bg2); border:1px solid var(--line); border-radius:6px; padding:14px 8px; text-align:center; }
.sc-v { font-family:'Rajdhani',sans-serif; font-size:24px; font-weight:700; }
.sc-l { font-size:9px; color:var(--txt2); margin-top:3px; letter-spacing:.06em; text-transform:uppercase; }

/* SUIÇA */
.stbl { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 20px; background: var(--panel); border: 1px solid var(--line2); border-radius: 6px; overflow: hidden; text-align: left; }
.stbl th { padding: 11px 16px; font-size: 10px; font-weight: 700; color: var(--txt3); border-bottom: 1px solid var(--line2); text-transform: uppercase; background: var(--bg2); }
.stbl td { padding: 10px 16px; border-bottom: 1px solid var(--line); color: var(--txt); }
.stbl tr:last-child td { border-bottom:none; }
.stbl tr.pr td { background: rgba(93, 156, 236, 0.1); color: var(--ct); font-weight: 600; border-left: 3px solid var(--ct); }
.stbl tr.adv td { color: var(--grn); }
.stbl tr.elim td { opacity:.4; }
.stbl td .teamcell { display:flex; align-items:center; gap:8px; }
.rw { color: var(--grn); font-weight: 700; } .rl { color: var(--red); font-weight: 700; }

.tlp { background:var(--panel); border:1px solid var(--line2); border-radius:6px; padding:14px; margin-bottom:16px; }
.tlp-t { font-size:10px; color:var(--txt3); margin-bottom:10px; letter-spacing:.12em; text-transform:uppercase; font-weight:700; }
.tlp-row { display:flex; justify-content:space-between; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid var(--line); font-size:12px; }
.tlp-row:last-child { border:none; }
.tlp-name { color:var(--txt); font-weight:600; display:flex; align-items:center; gap:6px; }
.tlp-meta { font-size:9px; color:var(--txt3); margin-left:4px; }
.tlp-role { color:var(--txt2); font-size:10px; }
.tlp-ovr { font-family:'Rajdhani',sans-serif; font-size:16px; font-weight:700; }
.divider { height: 1px; background: var(--line2); margin: 20px 0; }

/* CONFIRM BAR STICKY (draft) */
.confirm-bar { position:sticky; top:8px; z-index:50; display:flex; align-items:center; justify-content:space-between; gap:12px; background:var(--grn-dim); border:1px solid var(--grn); border-radius:6px; padding:10px 14px; margin-bottom:12px; box-shadow:0 4px 16px rgba(0,0,0,.5); }
.confirm-bar .cb-info { font-size:13px; color:#fff; }
.confirm-bar .cb-info b { font-weight:700; }
.confirm-bar .btn { padding:8px 16px; }

/* HISTÓRICO DA CAMPANHA */
.hist-wrap { background:var(--panel); border:1px solid var(--line2); border-radius:8px; padding:14px; margin-bottom:20px; }
.hist-title { font-size:12px; color:var(--grn); letter-spacing:.1em; text-transform:uppercase; font-weight:700; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.hist-row { display:grid; grid-template-columns:auto 1fr auto; gap:6px 14px; align-items:center; padding:10px 12px; border-radius:6px; margin-bottom:6px; background:var(--bg2); border-left:3px solid; }
.hist-row.w { border-left-color:var(--grn); }
.hist-row.l { border-left-color:var(--red); }
.hist-row .hist-stage { font-size:11px; color:var(--txt2); font-weight:700; text-transform:uppercase; letter-spacing:.04em; }
.hist-row .hist-bo { font-size:9px; color:var(--txt3); background:var(--bg); padding:1px 5px; border-radius:3px; margin-left:4px; }
.hist-row .hist-match { font-size:13px; color:var(--txt); }
.hist-row .hist-match b { font-weight:700; }
.hist-row .hist-res { font-size:10px; font-weight:700; padding:2px 7px; border-radius:3px; margin-right:6px; letter-spacing:.05em; }
.hist-row .hist-res.w { background:var(--grn-bg); color:var(--grn); }
.hist-row .hist-res.l { background:var(--red-bg); color:var(--red); }
.hist-row .hist-score { font-family:'Rajdhani',sans-serif; font-size:20px; font-weight:700; }
.hist-row .hist-score.w { color:var(--grn); }
.hist-row .hist-score.l { color:var(--red); }
.hist-row .hist-maps { grid-column:1/-1; font-size:10px; color:var(--txt3); margin-top:2px; font-family:'JetBrains Mono',monospace; }

/* ===== RESPONSIVIDADE MOBILE VERTICAL ===== */
@media (max-width: 640px) {
  body { padding: 6px; }
  .cs-root { border-radius: 6px; }
  .cs-pad { padding: 12px; }
  .hud-head { padding: 10px 12px; }
  .hud-logo { font-size: 15px; letter-spacing: .08em; gap:5px; }
  .hud-logo .sub { font-size: 9px; }
  .hud-status { font-size: 8px; }
  /* slots do draft: 5 colunas viram scroll horizontal compacto */
  .slots-bar { grid-template-columns: repeat(5, 1fr); gap: 4px; }
  .slot { padding: 7px 3px; }
  .slot-role { font-size: 7px; gap:2px; }
  .slot-name { font-size: 9px; gap:2px; }
  .slot-from { font-size: 7px; }
  .slot-ovr { font-size: 16px; }
  .ovr-strip { padding: 9px 12px; gap:10px; }
  .ovr-num { font-size: 19px; }
  /* placar */
  .board-sc { font-size: 44px; }
  .board-sc-colon { font-size: 28px; }
  .board-bigscore { gap: 18px; }
  .board-teams-lbl { font-size: 12px; flex-wrap:wrap; }
  .board-teams-lbl b { font-size: 13px; }
  .board-top { padding: 16px 12px; }
  /* TIMES: empilhados verticalmente em vez de lado a lado */
  .match-teams-wrapper { flex-direction: column; }
  .team-block { border-right: none; border-bottom: 1px solid var(--line2); }
  .team-block:last-child { border-bottom: none; }
  .sb-prow { padding: 9px 14px; font-size: 13px; }
  /* veto */
  .veto-map { min-width: 60px; }
  .veto-map .vm-name { font-size: 9px; }
  .veto-map .vm-img { height: 32px; }
  /* chips de função */
  .role-chip { font-size: 10px; padding: 4px 8px; }
  /* histórico */
  .hist-row { grid-template-columns: 1fr auto; }
  .hist-row .hist-stage { grid-column: 1/-1; }
  /* settings bar empilha */
  .settings-bar { gap: 8px; }
  .seg button { padding: 6px 9px; font-size: 10px; }
  /* botões ocupam largura */
  .btn { padding: 10px 14px; font-size: 11px; }
  .stat-grid { grid-template-columns: repeat(2,1fr); }
  .stbl th, .stbl td { padding: 8px 10px; }
  .confirm-bar { flex-direction: column; align-items: stretch; gap:8px; text-align:center; }
}
</style>

const beep=(f,d,v=.14,t='square')=>{try{const c=ac(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}};
function c4Explode(){
  try{
    const c=ac();
    const beeps=[0,.45,.8,1.1,1.35,1.55,1.7,1.82,1.91,1.97,2.01,2.04];
    beeps.forEach((bt)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='square';o.frequency.value=1100;g.gain.setValueAtTime(.0001,c.currentTime+bt);g.gain.exponentialRampToValueAtTime(.18,c.currentTime+bt+.005);g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+bt+.06);o.start(c.currentTime+bt);o.stop(c.currentTime+bt+.08);});
    const expAt=2.12;
    const bufSize=Math.floor(c.sampleRate*0.6);const buf=c.createBuffer(1,bufSize,c.sampleRate);const data=buf.getChannelData(0);
    for(let i=0;i<bufSize;i++){data[i]=(Math.random()*2-1)*Math.pow(1-i/bufSize,2);}
    const noise=c.createBufferSource();noise.buffer=buf;const ng=c.createGain();const nf=c.createBiquadFilter();nf.type='lowpass';nf.frequency.value=800;noise.connect(nf);nf.connect(ng);ng.connect(c.destination);ng.gain.setValueAtTime(.5,c.currentTime+expAt);ng.gain.exponentialRampToValueAtTime(.001,c.currentTime+expAt+.55);noise.start(c.currentTime+expAt);noise.stop(c.currentTime+expAt+.6);
    const boom=c.createOscillator(),bg=c.createGain();boom.connect(bg);bg.connect(c.destination);boom.type='sine';boom.frequency.setValueAtTime(120,c.currentTime+expAt);boom.frequency.exponentialRampToValueAtTime(40,c.currentTime+expAt+.5);bg.gain.setValueAtTime(.5,c.currentTime+expAt);bg.gain.exponentialRampToValueAtTime(.001,c.currentTime+expAt+.6);boom.start(c.currentTime+expAt);boom.stop(c.currentTime+expAt+.6);
  }catch(e){}
}

function roundProb(rA,rB){let p=0.5+((rA-rB)/100)*0.95;p+=(Math.random()-0.5)*0.10;return Math.max(0.30,Math.min(0.70,p));}
function simMap(rA,rB){
  const p=roundProb(rA,rB);let a=0,b=0,ot=false;const seq=[];
  while(a<13&&b<13){if(Math.random()<p)a++;else b++;seq.push({a,b});if(a===12&&b===12)break;}
  if(a===12&&b===12){ot=true;while(true){let oa=0,ob=0;for(let i=0;i<6;i++){if(Math.random()<p){oa++;a++;}else{ob++;b++;}seq.push({a,b});}if(oa>ob){a=Math.max(a,b+1);seq[seq.length-1]={a,b};break;}if(ob>oa){b=Math.max(b,a+1);seq[seq.length-1]={a,b};break;}}}
  let pa=0;seq.forEach(s=>{s.w=(s.a>pa)?'A':'B';pa=s.a;});
  return{mA:a,mB:b,ot,winner:a>b?'A':'B',seq};
}
function simSeries(rA,rB,mapsNeeded){const mpool=[...MAPS_POOL].sort(()=>Math.random()-.5);const maps=[];let wA=0,wB=0,mi=0;while(wA<mapsNeeded&&wB<mapsNeeded){const m=simMap(rA,rB);m.mapName=mpool[mi%mpool.length];mi++;maps.push(m);if(m.winner==='A')wA++;else wB++;}return{maps,wA,wB,won:wA>=mapsNeeded,pool:mpool,mapsNeeded};}

function genHLForMap(m,myP,oppP){
  const out=[];const mn=myP.map(p=>p.name);const on=oppP&&oppP.length?oppP.map(p=>p.name):mn;
  const mw=m.winner==='A';const n=1+Math.floor(Math.random()*2);
  for(let i=0;i<n;i++){const fm=mw?(Math.random()<.62):(Math.random()<.38);const pool=fm?mn:on;const pn=pool[Math.floor(Math.random()*pool.length)];let wep,t;if(PLAYER_HL[pn]){const a=PLAYER_HL[pn];[wep,t]=a[Math.floor(Math.random()*a.length)];}else{const g=GENERIC_HL[Math.floor(Math.random()*GENERIC_HL.length)];wep=g[0];t=g[1].replace('{p}',pn);}out.push({map:m.mapName,text:t,mine:fm,wep});}
  return out;
}

  let h='';

  if(G.pick){h+=`<div class="confirm-bar"><span class="cb-info">${wepIcon(G.pick._role)} <b>${G.pick.name}</b> como <b>${G.pick._role}</b> · OVR ${G.pick.ovr}</span><button class="btn btn-p" onclick="confirmP()"><i class="ti ti-check"></i> Confirmar</button></div>`;}

  l.players.forEach(p=>{
    const taken=G.takenP.has(p.name+l.id);
    const avail=availRolesFor(p);
    const blocked=avail.length===0;
    const chosen=G.pick&&G.pick.name===p.name;
    const dis=taken||blocked;
    const cls='prow'+(dis?' disabled':'')+(taken?' taken':'')+(chosen?' chosen':'');
    const reason=taken?'já selecionado':blocked?'sem vaga p/ funções dele':'';
    let roleChips=Object.entries(p.roles).map(([rr,ov])=>{
      const free=avail.includes(rr);
      const sel=chosen&&G.pick._role===rr;
      const chipCls='role-chip'+(free?'':' off')+(sel?' sel':'');
      const click=(!taken&&free)?`onclick="event.stopPropagation();pickP('${l.id}','${p.name}','${rr}')"`:'';
      return `<span class="${chipCls}" ${click}>${wepIcon(rr)} ${rr} <b>${ov}</b></span>`;
    }).join('');
    const headIcon=chosen?G.pick._role:(avail[0]||Object.keys(p.roles)[0]);
    h+=`<div class="${cls}"><div class="prow-wep" style="color:${chosen?'var(--grn)':'var(--txt3)'}">${wepIcon(headIcon)}</div><div style="flex:1"><div class="prow-name">${p.name} ${reason?`<span style="font-size:10px;color:var(--red);font-weight:normal">(${reason})</span>`:''}</div><div class="prow-note">${p.note}</div><div class="role-chips">${roleChips}</div></div></div>`;

  document.getElementById('lineup-reveal').innerHTML=h;
}

/* Veto SEM spoiler: mostra os mapas potenciais da série (total = mapsNeeded*2-1),
   marcando picks e o decider, mas NÃO indica quais foram jogados nem o resultado.
   O número de mapas é fixo pela série (Bo1=1, Bo3=3, Bo5=5), os banidos vêm depois. */
function renderVeto(res,bo){
  const total=res.mapsNeeded*2-1; // mapas que PODEM ser jogados
  const picks=res.pool.slice(0,total);        // os possíveis da série
  const bans=res.pool.slice(total,total+2);   // 2 banidos pra dar contexto visual
  let v=`<div class="veto">`;
  picks.forEach((mp,i)=>{
    const isDecider=bo>1&&i===total-1;
    let cls='veto-map '+(isDecider?'decider':'picked');
    let tag=bo===1?'MAPA':(isDecider?'DEC':'PICK');
    v+=`<div class="${cls}"><div class="vm-tag">${tag}</div><div class="vm-img" style="background-color:${MAP_BG[mp]||'#555'}"></div><div class="vm-name">${mp}</div></div>`;
  });
  bans.forEach(mp=>{v+=`<div class="veto-map banned"><div class="vm-tag">BAN</div><div class="vm-img" style="background-color:${MAP_BG[mp]||'#555'}"></div><div class="vm-name">${mp}</div></div>`;});
  return v+`</div>`;
}

async function playSeriesLive(res,oppTeam,bo){
  LIVE=true;
  const dur=SPEEDS[CFG.speed];
  let serA=0,serB=0;
  const myP=G.myTeam.players,oppP=oppTeam.players||[];
  const totalPotential=bo===1?1:(res.mapsNeeded*2-1);
  // helper: o board ainda está na tela?
  const alive=()=>!!document.getElementById('lv-a');

  // pips de série (bolinhas de mapa ganho) no topo
  function renderPips(){
    const el=document.getElementById('lv-pips');if(!el)return;
    let h='';for(let i=0;i<res.mapsNeeded;i++){h+=`<span class="pip-dot ${i<serA?'won':''}"></span>`;}
    h+=`<span class="pip-vs">${serA} - ${serB}</span>`;
    for(let i=0;i<res.mapsNeeded;i++){h+=`<span class="pip-dot opp ${i<serB?'won':''}"></span>`;}
    el.innerHTML=h;
  }

  try{
    // cria as linhas de mapa potenciais (histórico embaixo)
    const elMaps=document.getElementById('lv-maps');
    if(elMaps){
      elMaps.innerHTML='';
      for(let i=0;i<totalPotential;i++){
        const mp=res.pool[i];
        elMaps.insertAdjacentHTML('beforeend',`<div class="map-line pending" id="ml-${i}"><span class="mn"><i class="ti ti-map-pin" style="font-size:11px"></i>${mp}</span><span class="msc"><span class="ms" id="ml-a-${i}">—</span><span class="ms-sep">·</span><span class="ms" id="ml-b-${i}">—</span></span><span class="mot" id="ml-ot-${i}"></span><span class="mw" id="ml-w-${i}">não disputado</span></div>`);
      }
    }
    if(bo>1)renderPips();

    for(let mi=0;mi<res.maps.length;mi++){
      const m=res.maps[mi];
      const elMapbg=document.getElementById('lv-mapbg');if(elMapbg)elMapbg.style.backgroundColor=MAP_BG[m.mapName]||'#111';
      const elStage=document.getElementById('lv-stage'),elCur=document.getElementById('lv-curmap');
      if(elStage)elStage.innerHTML=`${stageLabel(bo)} <span class="board-livetag"><span class="lvdot"></span>AO VIVO</span>`;
      if(elCur)elCur.innerHTML=bo>1?`<i class="ti ti-map-pin"></i> Mapa ${mi+1} · <b>${m.mapName}</b>`:`<i class="ti ti-map-pin"></i> <b>${m.mapName}</b>`;
      const mlRow=document.getElementById('ml-'+mi);if(mlRow)mlRow.classList.remove('pending');
      const mlWInit=document.getElementById('ml-w-'+mi);if(mlWInit)mlWInit.textContent='ao vivo';

      // anima rounds (se a tela ainda existe); se sumir, faz fast-forward sem sleep
      for(let r=0;r<m.seq.length;r++){
        const s=m.seq[r];
        const elA=document.getElementById('lv-a'),elB=document.getElementById('lv-b');
        const mlA=document.getElementById('ml-a-'+mi),mlB=document.getElementById('ml-b-'+mi),elHalf=document.getElementById('lv-half');
        if(elA)elA.textContent=s.a;if(elB)elB.textContent=s.b;
        if(elA&&elB){const mine=s.w==='A';const bumped=mine?elA:elB;bumped.classList.remove('bump');void bumped.offsetWidth;bumped.classList.add('bump');}
        if(mlA)mlA.textContent=s.a;if(mlB)mlB.textContent=s.b;
        if(alive())sfx.tick(s.w==='A');
        if(elHalf){if(s.a+s.b===12)elHalf.textContent='— troca de lado —';else if(m.ot&&(s.a+s.b)>24&&(s.a+s.b-24)%6===0)elHalf.textContent='— overtime —';else elHalf.textContent=`round ${s.a+s.b}`;}
        if(alive())await sleep(dur); // só espera se ainda visível; senão fast-forward
      }
      // fim do mapa
      const aw=m.winner==='A';
      const elA=document.getElementById('lv-a'),elB=document.getElementById('lv-b');
      if(elA){elA.classList.toggle('w',aw);elA.classList.toggle('l',!aw);}
      if(elB){elB.classList.toggle('w',!aw);elB.classList.toggle('l',aw);}
      const mlA=document.getElementById('ml-a-'+mi),mlB=document.getElementById('ml-b-'+mi);
      if(mlA){mlA.textContent=m.mA;mlA.classList.toggle('w',aw);mlA.classList.toggle('l',!aw);}
      if(mlB){mlB.textContent=m.mB;mlB.classList.toggle('w',!aw);mlB.classList.toggle('l',aw);}
      const mlSep=document.querySelector('#ml-'+mi+' .ms-sep');if(mlSep)mlSep.textContent='—';
      const mlOt=document.getElementById('ml-ot-'+mi),mlW=document.getElementById('ml-w-'+mi);
      if(mlOt&&m.ot)mlOt.textContent='OT';if(mlW)mlW.textContent=aw?'Seu Time':oppTeam.name;
      if(aw)serA++;else serB++;
      if(bo>1)renderPips();
      if(alive())sfx.map();

      // highlights
      const elFeed=document.getElementById('lv-feed');
      if(elFeed){genHLForMap(m,myP,oppP).forEach(h=>{elFeed.insertAdjacentHTML('beforeend',`<div class="hl-item"><span class="hl-wep"><i class="ti ${h.wep}"></i></span><span class="hl-map">${h.map}</span><span class="hl-text">${h.text}</span></div>`);});}

      if(serA>=res.mapsNeeded||serB>=res.mapsNeeded)break;
      if(alive())await sleep(dur*3);
      // reset placar grande pro próximo mapa
      if(mi<res.maps.length-1){const ea=document.getElementById('lv-a'),eb=document.getElementById('lv-b'),eh=document.getElementById('lv-half');if(ea){ea.textContent='0';ea.className='board-sc live';}if(eb){eb.textContent='0';eb.className='board-sc live';}if(eh)eh.textContent='';}
    }

    // estado final
    const elA=document.getElementById('lv-a'),elB=document.getElementById('lv-b'),elStage=document.getElementById('lv-stage'),elHalf=document.getElementById('lv-half'),elCur=document.getElementById('lv-curmap');
    if(bo>1){const won=serA>serB;if(elA){elA.textContent=serA;elA.className='board-sc '+(won?'w':'l');}if(elB){elB.textContent=serB;elB.className='board-sc '+(won?'l':'w');}if(elStage)elStage.innerHTML=`Série encerrada · ${stageLabel(bo)}`;if(elCur)elCur.innerHTML=`<i class="ti ti-flag-checkered"></i> Resultado final em mapas`;renderPips();}
    else{if(elStage)elStage.innerHTML=`${res.maps[0].mapName} · Final`;}
    if(elHalf)elHalf.textContent='';
  } finally {
    LIVE=false; // GARANTE que nunca trava, aconteça o que acontecer
  }
}
function stageLabel(bo){return bo===1?'BO1':(bo===3?'BO3':'BO5');}

/* ===================== SUÍÇA ===================== */
function pickOpp(){const ps=G.swiss['myteam'];const same=Object.values(G.swiss).filter(s=>s.team.id!=='myteam'&&s.wins===ps.wins&&s.losses===ps.losses);const pool=same.length?same:Object.values(G.swiss).filter(s=>s.team.id!=='myteam'&&s.wins+s.losses<5);return pool[Math.floor(Math.random()*pool.length)].team;}

function renderSwiss(){
  if(LIVE)return;
  const ps=G.swiss['myteam'];const opp=pickOpp();G._swOpp=opp;setPhase(`SUÍÇA ${ps.wins}V - ${ps.losses}D`);
  const standing=Object.values(G.swiss).sort((a,b)=>(b.wins-b.losses)-(a.wins-a.losses));
  let tbl=`<table class="stbl"><thead><tr><th>#</th><th>Equipe</th><th>V</th><th>D</th><th>Status</th></tr></thead><tbody>`;
  standing.forEach((s,i)=>{const mine=s.team.id==='myteam',adv=s.wins>=3,elim=s.losses>=3;const st=adv?'CLASSIF.':elim?'FORA':'—';tbl+=`<tr class="${mine?'pr':''} ${adv&&!mine?'adv':''} ${elim?'elim':''}"><td style="color:var(--txt3)">${i+1}</td><td><div class="teamcell">${flag(s.team.country)} ${s.team.name}</div></td><td class="rw">${s.wins}</td><td class="rl">${s.losses}</td><td style="font-size:9px;letter-spacing:.05em">${st}</td></tr>`;});
  tbl+=`</tbody></table>`;
  const lp=`<div class="tlp"><div class="tlp-t">Sua Lineup · OVR ${G.myOvr}</div>`+Object.values(G.slots).filter(Boolean).map(p=>`<div class="tlp-row"><span class="tlp-name">${wepIcon(p.role)} ${flag(p._country)} ${p.name}<span class="tlp-meta">${p._from}</span></span><span style="display:flex;gap:10px;align-items:center"><span class="tlp-role">${p.role}</span><span class="tlp-ovr" style="color:${ovrColor(p.ovr)}">${p.ovr}</span></span></div>`).join('')+`</div>`;

  document.getElementById('swiss-content').innerHTML=`${settingsBar()}
  <div class="match-stage">Rodada ${G.swRound} // Fase Suíça // BO1</div>
  <div class="board"><div class="board-top"><div class="board-scanline"></div><div class="board-top-in"><div class="board-maprow"><span>Partida Encontrada</span></div><div class="board-bigscore"><span class="board-sc tie">⚡</span><span class="board-sc-colon">VS</span><span class="board-sc tie">${flag(opp.country)}</span></div><div class="board-teams-lbl"><b>Seu Time [${G.myOvr}]</b> <span style="color:var(--txt3)">VS</span> <b>${flag(opp.country)} ${opp.name} [${opp.rating}]</b></div></div></div></div>
  <div class="btn-row" style="margin-bottom:20px"><button class="btn btn-p" onclick="resolveSwiss('${opp.id}')"><i class="ti ti-player-play"></i> Iniciar BO1</button></div>
  <div class="divider"></div>${lp}${tbl}`;
  if(CFG.mode==='auto')setTimeout(()=>{if(!LIVE)resolveSwiss(opp.id);},SPEEDS[CFG.speed]*3);
}

async function resolveSwiss(oppId){
  if(LIVE)return;
  const opp=G.swiss[oppId]?G.swiss[oppId].team:{name:'Adversário',country:'🌍',rating:85,players:[]};
  const res=simSeries(G.myOvr,opp.rating,1);const won=res.won;
  const sa=res.maps[0].mA,sb=res.maps[0].mB; // placar do mapa único
  const cont=document.getElementById('swiss-content');
  cont.innerHTML=`<div id="topslot"></div><div class="match-stage">Fase Suíça // BO1 // ${flag(opp.country)} ${opp.name}</div>${renderVeto(res,1)}${buildBoardShell(opp,'Fase Suíça',1)}<div class="btn-row" id="postmatch"></div>`;
  await playSeriesLive(res,opp,1);

  const ps=G.swiss['myteam'];
  if(won){ps.wins++;G.swWins++;sfx.win();}else{ps.losses++;G.swLosses++;sfx.loss();}
  if(G.swiss[oppId]){if(won)G.swiss[oppId].losses++;else G.swiss[oppId].wins++;}
  G.swRound++;setPhase(`SUÍÇA ${ps.wins}V - ${ps.losses}D`);
  // registra no histórico
  G.history.push({stage:'Fase Suíça',bo:1,opp:opp.name,oppCountry:opp.country,won,score:won?`${sa}-${sb}`:`${sa}-${sb}`,scoreA:sa,scoreB:sb});

  let bannerHtml='',btnHtml='';
  if(ps.wins>=3){bannerHtml=`<div class="res-banner win"><h2><i class="ti ti-trophy"></i> CLASSIFICADO</h2><p>Você avançou para os Playoffs (${ps.wins}V-${ps.losses}D)</p></div>`;btnHtml=`<button class="btn btn-p" onclick="startPlayoffs()">Avançar aos Playoffs <i class="ti ti-arrow-right"></i></button>`;if(CFG.mode==='auto')setTimeout(()=>{if(!LIVE)startPlayoffs();},SPEEDS[CFG.speed]*4);}
  else if(ps.losses>=3){sfx.c4();bannerHtml=`<div class="res-banner loss"><h2><i class="ti ti-bomb"></i> ELIMINADO</h2><p>Fim da linha na Fase Suíça (${ps.wins}V-${ps.losses}D)</p></div>`;btnHtml=`<button class="btn btn-p" onclick="showCampaignEnd(false)"><i class="ti ti-list"></i> Ver Resumo da Campanha</button> <button class="btn btn-s" onclick="restartAll()"><i class="ti ti-refresh"></i> Novo Draft</button>`;}
  else{bannerHtml='';btnHtml=`<button class="btn btn-p" onclick="renderSwiss()">Próxima Rodada <i class="ti ti-arrow-right"></i></button>`;if(CFG.mode==='auto')setTimeout(()=>{if(!LIVE)renderSwiss();},SPEEDS[CFG.speed]*4);}
  injectButtons('swiss-content',bannerHtml,btnHtml,CFG.mode==='manual');
}

/* ===================== PLAYOFFS ===================== */
/* Injeta banner+botões de forma GARANTIDA. Se os slots sumiram, recria no container.
   Sempre adiciona um botão de emergência de Novo Draft. */
function injectButtons(containerId,bannerHtml,btnHtml,doScroll){
  const cont=document.getElementById(containerId);
  if(!cont)return;
  // garante botão de emergência sempre presente
  const safeBtns=btnHtml+` <button class="btn btn-ghost-em" onclick="restartAll()" title="Recomeçar do zero"><i class="ti ti-refresh"></i></button>`;
  let top=document.getElementById('topslot');
  if(!top){ // recria no topo do container
    cont.insertAdjacentHTML('afterbegin','<div id="topslot"></div>');
    top=document.getElementById('topslot');
  }
  if(top)top.innerHTML=bannerHtml+`<div class="btn-row" style="margin-bottom:16px">${safeBtns}</div>`;
  let post=document.getElementById('postmatch');
  if(!post){cont.insertAdjacentHTML('beforeend','<div class="btn-row" id="postmatch"></div>');post=document.getElementById('postmatch');}
  if(post)post.innerHTML=safeBtns;
  if(doScroll&&top){try{top.scrollIntoView({behavior:'smooth',block:'start'});}catch(e){}}
}

function startPlayoffs(){if(LIVE)return;const adv=Object.values(G.swiss).filter(s=>s.wins>=3&&s.team.id!=='myteam').map(s=>s.team);const pool=adv.length>=7?adv.slice(0,7):[...adv,...G.bracket.filter(b=>!adv.includes(b))].slice(0,7);G.playoffPool=[G.myTeam,...pool];G._poPlayed=[];showScreen('s-playoffs');renderPO('Quartas de Final','qf');}
function getOpp(ex=[]){const pool=G.playoffPool.filter(t=>t.id!=='myteam'&&!ex.includes(t.id));return pool[Math.floor(Math.random()*pool.length)]||G.bracket[0];}

function renderPO(stageName,stageKey){
  if(LIVE)return;
  const isFinal=stageKey==='final';const opp=getOpp(G._poPlayed||[]);G._poOpp=opp;setPhase(`PLAYOFFS · ${isFinal?'BO5':'BO3'}`);
  document.getElementById('playoffs-content').innerHTML=`${settingsBar()}
  <div class="match-stage">${stageName} // ${isFinal?'BO5':'BO3'} // Eliminação Direta</div>
  <div class="board"><div class="board-top"><div class="board-scanline"></div><div class="board-top-in"><div class="board-maprow"><span>Confronto Definido</span></div><div class="board-bigscore"><span class="board-sc tie">⚡</span><span class="board-sc-colon">VS</span><span class="board-sc tie">${flag(opp.country)}</span></div><div class="board-teams-lbl"><b>Seu Time [${G.myOvr}]</b> <span style="color:var(--txt3)">VS</span> <b>${flag(opp.country)} ${opp.name} [${opp.rating}]</b></div></div></div></div>
  <div class="btn-row"><button class="btn btn-p" onclick="resolvePO('${opp.id}','${stageName}','${stageKey}')"><i class="ti ti-player-play"></i> Iniciar ${isFinal?'BO5':'BO3'}</button></div>`;
  if(CFG.mode==='auto')setTimeout(()=>{if(!LIVE)resolvePO(opp.id,stageName,stageKey);},SPEEDS[CFG.speed]*3);
}

async function resolvePO(oppId,stageName,stageKey){
  if(LIVE)return;
  const opp=G.playoffPool.find(t=>t.id===oppId)||G.bracket.find(t=>t.id===oppId)||{name:'Adversário',country:'🌍',rating:88,players:[]};
  const isFinal=stageKey==='final';const bo=isFinal?5:3;const need=isFinal?3:2;
  const res=simSeries(G.myOvr,opp.rating,need);const won=res.won;
  const cont=document.getElementById('playoffs-content');
  cont.innerHTML=`<div id="topslot"></div><div class="match-stage">${stageName} // ${isFinal?'BO5':'BO3'} // ${flag(opp.country)} ${opp.name}</div>${renderVeto(res,bo)}${buildBoardShell(opp,stageName,bo)}<div class="btn-row" id="postmatch"></div>`;
  await playSeriesLive(res,opp,bo);

  // registra histórico (placar da série em mapas)
  G.history.push({stage:stageName,bo,opp:opp.name,oppCountry:opp.country,won,score:`${res.wA}-${res.wB}`,scoreA:res.wA,scoreB:res.wB,maps:res.maps.map(m=>({name:m.mapName,a:m.mA,b:m.mB,ot:m.ot,won:m.winner==='A'}))});

  let bannerHtml='',btnHtml='';
  if(!won){sfx.c4();bannerHtml=`<div class="res-banner loss"><h2><i class="ti ti-bomb"></i> ELIMINADO</h2><p>Derrota para ${opp.name} na ${stageName} (${res.wA}-${res.wB})</p></div>`;btnHtml=`<button class="btn btn-p" onclick="showCampaignEnd(false)"><i class="ti ti-list"></i> Ver Resumo da Campanha</button> <button class="btn btn-s" onclick="restartAll()"><i class="ti ti-refresh"></i> Novo Draft</button>`;}
  else{
    sfx.win();G._poPlayed.push(oppId);
    const next={qf:{n:'Semifinal',k:'sf'},sf:{n:'Grande Final',k:'final'}};
    if(!next[stageKey]){bannerHtml=`<div class="res-banner win"><h2><i class="ti ti-trophy"></i> CAMPEÃO DO MAJOR</h2><p>Sua lineup conquistou o título! GGWP 🏆</p></div>`;btnHtml=`<button class="btn btn-p" onclick="showCampaignEnd(true)"><i class="ti ti-list"></i> Ver Resumo da Campanha</button>`;}
    else{bannerHtml=`<div class="res-banner win"><h2><i class="ti ti-check"></i> VITÓRIA</h2><p>Avançou para a ${next[stageKey].n} (${res.wA}-${res.wB})</p></div>`;btnHtml=`<button class="btn btn-p" onclick="renderPO('${next[stageKey].n}','${next[stageKey].k}')">Avançar para ${next[stageKey].n} <i class="ti ti-arrow-right"></i></button>`;if(CFG.mode==='auto')setTimeout(()=>{if(!LIVE)renderPO(next[stageKey].n,next[stageKey].k);},SPEEDS[CFG.speed]*4);}
  }
  const top=document.getElementById('topslot');
  injectButtons('playoffs-content',bannerHtml,btnHtml,CFG.mode==='manual');
}

/* ===================== RESUMO DA CAMPANHA ===================== */
function showCampaignEnd(champion){
  showScreen('s-result');setPhase(champion?'CAMPEÃO 🏆':'CAMPANHA ENCERRADA');
  const slots=Object.values(G.slots).filter(Boolean);
  const wins=G.history.filter(h=>h.won).length,losses=G.history.filter(h=>!h.won).length;
  let rows=G.history.map((h,i)=>{
    const mapsDetail=h.maps?h.maps.map(m=>`${m.name} ${m.a}-${m.b}${m.ot?' OT':''}`).join(' · '):'';
    return `<div class="hist-row ${h.won?'w':'l'}">
      <div class="hist-stage">${h.stage} <span class="hist-bo">BO${h.bo}</span></div>
      <div class="hist-match"><span class="hist-res ${h.won?'w':'l'}">${h.won?'VITÓRIA':'DERROTA'}</span> vs ${flag(h.oppCountry)} <b>${h.opp}</b></div>
      <div class="hist-score ${h.won?'w':'l'}">${h.score}</div>
      ${mapsDetail?`<div class="hist-maps">${mapsDetail}</div>`:''}
    </div>`;
  }).join('');
  const lineupHtml=`<div class="tlp"><div class="tlp-t">Lineup da Campanha · OVR ${G.myOvr}</div>`+slots.map(p=>`<div class="tlp-row"><span class="tlp-name">${wepIcon(p.role)} ${flag(p._country)} ${p.name}<span class="tlp-meta">${p._from}</span></span><span style="display:flex;gap:10px;align-items:center"><span class="tlp-role">${p.role}</span><span class="tlp-ovr" style="color:${ovrColor(p.ovr)}">${p.ovr}</span></span></div>`).join('')+`</div>`;
  document.getElementById('result-content').innerHTML=`
  <div class="res-banner ${champion?'win':'loss'}"><h2><i class="ti ti-${champion?'trophy':'flag'}"></i> ${champion?'CAMPEÃO DO MAJOR':'CAMPANHA ENCERRADA'}</h2><p>${champion?'Você levantou o troféu! 🏆':'Fim da jornada nesse Major'}</p></div>
  <div class="stat-grid">
    <div class="sc"><div class="sc-v" style="color:var(--grn)">${G.myOvr}</div><div class="sc-l">overall</div></div>
    <div class="sc"><div class="sc-v" style="color:var(--grn)">${wins}</div><div class="sc-l">vitórias</div></div>
    <div class="sc"><div class="sc-v" style="color:var(--red)">${losses}</div><div class="sc-l">derrotas</div></div>
    <div class="sc"><div class="sc-v">${champion?'🏆':'💀'}</div><div class="sc-l">${champion?'título':'fim'}</div></div>
  </div>
  ${lineupHtml}
  <div class="hist-wrap"><div class="hist-title"><i class="ti ti-history"></i> Histórico de Partidas</div>${rows||'<div style="color:var(--txt3);font-size:12px;padding:10px">Nenhuma partida registrada</div>'}</div>
  <div class="btn-row"><button class="btn btn-p" onclick="restartAll()"><i class="ti ti-refresh"></i> Novo Draft</button> <button class="btn" onclick="restartMajor()"><i class="ti ti-rotate"></i> Repetir Major (mesmo time)</button></div>`;
}

/* ===================== RESET ===================== */
function restartAll(){G={slots:{IGL:null,AWPer:null,Entry:null,Support:null,Lurker:null},usedL:new Set(),takenP:new Set(),curL:null,pick:null,swiss:{},swRound:1,swWins:0,swLosses:0,myOvr:0,myTeam:null,bracket:[],history:[]};LIVE=false;document.getElementById('lineup-reveal').innerHTML='';document.getElementById('dice-hint').textContent='clique para sortear lineup';document.getElementById('dice').textContent='⚄';renderSlots();showScreen('s-draft');}
function restartMajor(){LIVE=false;G.swiss={};G.swRound=1;G.swWins=0;G.swLosses=0;G._poPlayed=[];G.history=[];startMajor();}

renderSlots();

</script>
