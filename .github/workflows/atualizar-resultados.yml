name: Atualizar resultados da Copa
on:
  schedule:
    - cron: "*/30 * * * *"   # a cada 30 min (UTC)
  workflow_dispatch:
permissions:
  contents: write
jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: Buscar placares e atualizar
        id: robo
        env:
          FD_TOKEN: ${{ secrets.FD_TOKEN }}
        run: node scripts/atualizar-resultados.mjs

      - name: Commit se mudou
        run: |
          if [[ -n "$(git status --porcelain dados/resultados.json)" ]]; then
            git config user.name "bolao-bot"
            git config user.email "bot@users.noreply.github.com"
            git add dados/resultados.json
            git commit -m "Atualiza placares (robô)"
            git push
          else
            echo "Nada a commitar."
          fi

      - name: Preparar corpo do e-mail
        id: msg
        if: steps.robo.outputs.novos != '0' && steps.robo.outputs.novos != ''
        run: |
          echo "corpo<<MSG_EOF" >> $GITHUB_OUTPUT
          cat mensagem.txt >> $GITHUB_OUTPUT
          echo "MSG_EOF" >> $GITHUB_OUTPUT

      - name: Enviar e-mail (só se entrou placar novo)
        if: steps.robo.outputs.novos != '0' && steps.robo.outputs.novos != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "🏆 Bolão Copa 2026 — novo placar e ranking"
          to: ${{ secrets.MAIL_TO }}
          from: Bolão Bot <${{ secrets.GMAIL_USER }}>
          body: ${{ steps.msg.outputs.corpo }}
